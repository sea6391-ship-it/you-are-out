<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>도편추방제 — 오스트라키스모스</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Noto+Serif+KR:wght@400;500;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --clay: #EFE0BB;
    --clay-dark: #DFCB9D;
    --paper-line: #C9B27F;
    --terracotta: #BB5A35;
    --terracotta-dark: #8B3D22;
    --terracotta-light: #D98756;
    --ink: #211912;
    --ink-soft: #3A2C20;
    --marble: #17110B;
    --marble-soft: #2B211A;
    --gold: #C9A227;
    --gold-soft: #E4C766;
    --shadow: rgba(33,25,18,0.28);

    --font-display: 'Cinzel', serif;
    --font-body: 'Noto Serif KR', serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }

  body{
    background:
      radial-gradient(ellipse at top, rgba(255,255,255,0.25), transparent 60%),
      var(--clay);
    color: var(--ink);
    font-family: var(--font-body);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app{
    max-width: 1120px;
    margin: 0 auto;
    padding: 0 20px 64px;
  }

  a{ color: inherit; }

  button{
    font-family: var(--font-body);
    cursor: pointer;
    border: none;
    background: none;
  }
  button:focus-visible, input:focus-visible{
    outline: 3px solid var(--terracotta-dark);
    outline-offset: 2px;
  }

  /* ---------- 장식: 메안더 패턴 ---------- */
  .meander{
    height: 13px;
    width: 100%;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='26' height='13' viewBox='0 0 26 13'><path d='M0 13 L0 0 L26 0 L26 4 L7 4 L7 7 L22 7 L22 13 L0 13 Z' fill='%23211912'/></svg>");
    background-repeat: repeat-x;
    background-size: 26px 13px;
    opacity: 0.55;
    margin: 22px 0;
  }
  .meander.light{
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='26' height='13' viewBox='0 0 26 13'><path d='M0 13 L0 0 L26 0 L26 4 L7 4 L7 7 L22 7 L22 13 L0 13 Z' fill='%23C9A227'/></svg>");
    opacity: 0.7;
  }

  /* ---------- 헤더 / 히어로 ---------- */
  .hero{
    text-align: center;
    padding-top: 48px;
  }

  .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--terracotta-dark);
    margin: 0 0 6px;
  }

  .title{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(34px, 7vw, 56px);
    margin: 0;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .title small{
    display: block;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.32em;
    color: var(--terracotta-dark);
    margin-top: 10px;
  }

  .hero-image{
    margin: 30px auto 0;
    max-width: 560px;
    aspect-ratio: 16/10;
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 18px 40px var(--shadow);
    border: 1px solid var(--clay-dark);
  }
  .hero-image img{
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .hero-placeholder{
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    background:
      repeating-linear-gradient(135deg, rgba(33,25,18,0.06) 0 14px, transparent 14px 28px),
      linear-gradient(160deg, #DCC596, #C99B68);
    color: var(--ink-soft);
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
    padding: 20px;
  }
  .hero-placeholder svg{ width: 46px; height: 46px; opacity: 0.65; }

  .tagline{
    max-width: 560px;
    margin: 28px auto 0;
    font-size: 16px;
    color: var(--ink-soft);
  }

  .btn{
    font-weight: 700;
    border-radius: 3px;
    padding: 15px 34px;
    font-size: 16px;
    letter-spacing: 0.02em;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn:hover{ transform: translateY(-1px); }
  .btn:active{ transform: translateY(0); }

  .btn-primary{
    background: var(--terracotta);
    color: #FBF1DE;
    box-shadow: 0 8px 20px rgba(139,61,34,0.35);
  }
  .btn-primary:hover{ background: var(--terracotta-dark); }
  .btn-primary:disabled{ opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-secondary{
    background: var(--ink);
    color: var(--clay);
  }
  .btn-secondary:hover{ background: var(--ink-soft); }

  .btn-ghost{
    color: var(--gold-soft);
    border: 1px solid rgba(228,199,102,0.5);
    padding: 11px 26px;
    font-size: 14px;
  }
  .btn-ghost:hover{ background: rgba(228,199,102,0.08); }

  .btn-gold{
    background: var(--gold);
    color: var(--marble);
    box-shadow: 0 8px 22px rgba(0,0,0,0.4);
  }
  .btn-gold:hover{ background: var(--gold-soft); }

  .cta-row{ margin-top: 30px; }

  .countdown{
    margin: 16px 0 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--ink-soft);
    opacity: 0.85;
  }

  .results-btn-wrap{
    text-align: center;
    margin-top: 30px;
    min-height: 1px;
  }
  .results-pill{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ink);
    color: var(--gold-soft);
    padding: 14px 28px;
    border-radius: 999px;
    font-size: 14px;
    letter-spacing: 0.02em;
    box-shadow: 0 10px 26px var(--shadow);
    animation: glow 2.4s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ box-shadow: 0 10px 26px var(--shadow); }
    50%{ box-shadow: 0 10px 30px rgba(201,162,39,0.35); }
  }

  /* ---------- 메인 그리드 ---------- */
  .main-grid{
    display: grid;
    grid-template-columns: 1.3fr 0.9fr;
    gap: 40px;
    margin-top: 56px;
    align-items: start;
  }
  @media (max-width: 860px){
    .main-grid{ grid-template-columns: 1fr; gap: 36px; }
  }

  .voting-area.hidden{ display:none; }

  .vote-card{
    background: rgba(255,255,255,0.18);
    border: 1px solid var(--clay-dark);
    border-radius: 6px;
    padding: 30px;
  }

  .vote-card label{
    display:block;
    font-size: 13px;
    font-family: var(--font-mono);
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    margin-bottom: 10px;
  }

  .vote-card input[type="text"]{
    width: 100%;
    padding: 14px 16px;
    font-size: 17px;
    font-family: var(--font-body);
    border: 2px solid var(--clay-dark);
    border-radius: 4px;
    background: rgba(255,255,255,0.55);
    color: var(--ink);
  }
  .vote-card input[type="text"]:disabled{ opacity: 0.6; }

  .vote-card .btn{ margin-top: 16px; width: 100%; }

  /* ---------- 도자기 파편 ---------- */
  .shard-wrap{
    margin-top: 26px;
    text-align: center;
  }
  .shard-wrap.hidden{ display:none; }

  .shard{
    width: 92%;
    max-width: 320px;
    min-height: 130px;
    margin: 0 auto;
    padding: 26px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.18), transparent 55%),
      linear-gradient(155deg, var(--terracotta-light), var(--terracotta) 55%, var(--terracotta-dark));
    clip-path: polygon(8% 2%, 55% 0%, 92% 8%, 100% 42%, 88% 78%, 96% 96%, 60% 100%, 18% 92%, 0% 58%, 4% 22%);
    box-shadow: 0 14px 30px var(--shadow);
    position: relative;
    transition: transform 0.7s cubic-bezier(.55,0,.65,1), opacity 0.65s ease;
  }
  .shard::after{
    content:"";
    position:absolute;
    top:8%; left:62%;
    width:1px; height:70%;
    background: rgba(33,25,18,0.22);
    transform: rotate(14deg);
  }
  .shard.dropping{
    transform: translateY(240px) rotate(55deg) scale(0.22);
    opacity: 0;
  }
  .shard-text{
    font-family: var(--font-body);
    font-weight: 700;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: 0.04em;
    word-break: keep-all;
  }
  .shard-text span{
    display: inline-block;
    opacity: 0;
    animation: chisel 0.4s ease forwards;
  }
  @keyframes chisel{
    from{ opacity:0; transform: translateY(-7px) scale(0.7) rotate(-7deg); }
    to{ opacity:1; transform: none; }
  }

  .shard-wrap .btn{ margin-top: 22px; }

  /* ---------- 크라테르(바구니) ---------- */
  .krater-wrap{
    margin-top: 34px;
    display: flex;
    justify-content: center;
  }
  .krater-wrap svg{
    width: 130px;
    height: auto;
    transition: transform 0.45s ease;
  }
  .krater-wrap.pulse svg{ transform: scale(1.06); }
  .krater-caption{
    text-align:center;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 8px;
    opacity: 0.75;
  }

  /* ---------- 역사 패널(양피지) ---------- */
  .history-panel{
    background:
      repeating-linear-gradient(0deg, transparent 0 30px, rgba(33,25,18,0.05) 30px 31px),
      linear-gradient(170deg, #F1E2BC, #E2CA98);
    border: 1px solid var(--paper-line);
    border-radius: 4px;
    padding: 26px 24px 30px;
    box-shadow: 0 12px 26px var(--shadow), inset 0 0 30px rgba(139,61,34,0.07);
  }
  .history-panel h2{
    font-family: var(--font-display);
    font-size: 19px;
    letter-spacing: 0.04em;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .history-sub{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.8;
    margin: 0 0 4px;
  }
  .meander-mini{
    height: 10px;
    margin: 14px 0 16px;
  }

  .history-list{
    list-style: none;
    margin: 0;
    padding: 0;
    max-height: 520px;
    overflow-y: auto;
  }
  .history-empty{
    font-size: 14px;
    color: var(--ink-soft);
    opacity: 0.8;
    padding: 10px 0;
  }
  .history-item{
    padding: 14px 0;
    border-bottom: 1px dashed var(--paper-line);
  }
  .history-item:last-child{ border-bottom: none; }
  .history-date{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--terracotta-dark);
    letter-spacing: 0.04em;
  }
  .history-winner{
    font-weight: 700;
    font-size: 17px;
    margin: 4px 0 2px;
    color: var(--ink);
  }
  .history-count{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }

  .footnote{
    text-align: center;
    margin-top: 60px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-soft);
    opacity: 0.6;
  }

  /* ---------- 오버레이(결과 발표) ---------- */
  .overlay{
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, var(--marble-soft), var(--marble));
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .overlay.hidden{ display: none; }

  .overlay-inner{
    text-align: center;
    max-width: 480px;
  }

  .loading-state.hidden, .reveal-state.hidden{ display:none; }

  .spin-shards{
    display:flex;
    justify-content:center;
    gap: 14px;
    margin-bottom: 26px;
  }
  .mini-shard{
    width: 34px; height: 34px;
    background: var(--terracotta);
    clip-path: polygon(10% 0%, 90% 8%, 100% 60%, 70% 100%, 10% 90%, 0% 40%);
    animation: tumble 1.1s ease-in-out infinite;
  }
  .mini-shard:nth-child(2){ animation-delay: 0.15s; background: var(--terracotta-light); }
  .mini-shard:nth-child(3){ animation-delay: 0.3s; background: var(--terracotta-dark); }
  .mini-shard:nth-child(4){ animation-delay: 0.45s; background: var(--terracotta); }
  @keyframes tumble{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-16px) rotate(180deg); }
  }
  .loading-text{
    font-family: var(--font-display);
    color: var(--gold-soft);
    font-size: 17px;
    letter-spacing: 0.06em;
  }

  .reveal-eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--terracotta-light);
    margin: 0 0 14px;
  }
  .reveal-name{
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(32px, 9vw, 54px);
    color: var(--gold);
    margin: 0 0 18px;
    text-shadow: 0 0 30px rgba(201,162,39,0.35);
    word-break: keep-all;
  }
  .reveal-meta{
    font-family: var(--font-mono);
    font-size: 14px;
    color: #E7DAC0;
    margin: 0 0 18px;
  }
  .reveal-flavor{
    font-size: 16px;
    color: #CDBE9C;
    margin: 0 0 30px;
    line-height: 1.7;
  }

  /* ---------- 토스트 ---------- */
  .toast{
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: var(--clay);
    padding: 12px 22px;
    border-radius: 999px;
    font-size: 14px;
    box-shadow: 0 10px 24px var(--shadow);
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    z-index: 200;
  }
  .toast.hidden{ visibility: hidden; }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>

  var FULL_VOTES_FOR_FILL = 20; // 시각적 표현용, 실제 집계와 무관

  function pad(n){ return n.toString().padStart(2,'0'); }
  function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function formatKoreanDate(key){
    var parts = key.split('-');
    return parseInt(parts[1],10)+'월 '+parseInt(parts[2],10)+'일';
  }

  function getUpcomingDeadline(now){
    var d = new Date(now);
    var day = d.getDay(); // 0 일 ... 5 금 ... 6 토
    var diff = (5 - day + 7) % 7;
    var candidate = new Date(d.getFullYear(), d.getMonth(), d.getDate()+diff, DEADLINE_HOUR,0,0,0);
    if(diff === 0 && d.getTime() >= candidate.getTime()){
      candidate = new Date(candidate.getFullYear(), candidate.getMonth(), candidate.getDate()+7, DEADLINE_HOUR,0,0,0);
    }
    return candidate;
  }

  function getPeriods(now){
    var upcoming = getUpcomingDeadline(now);
    var last = new Date(upcoming);
    last.setDate(last.getDate()-7);
    return {
      currentPeriodKey: dateKey(upcoming),
      currentDeadline: upcoming,
      lastPeriodKey: dateKey(last),
      lastDeadline: last
    };
  }

  // ---------- storage helpers ----------
  async function getVoteKeys(periodKey){
    try{
      var res = await window.storage.list('vote:'+periodKey+':', true);
      return (res && res.keys) ? res.keys : [];
    }catch(e){ return []; }
  }

  async function chunkAll(items, fn, size){
    size = size || 8;
    var out = [];
    for(var i=0;i<items.length;i+=size){
      var chunk = items.slice(i, i+size);
      var r = await Promise.all(chunk.map(fn));
      out = out.concat(r);
    }
    return out;
  }

  async function getVoteNames(periodKey){
    var keys = await getVoteKeys(periodKey);
    var names = await chunkAll(keys, async function(k){
      try{
        var r = await window.storage.get(k, true);
        return r ? r.value : null;
      }catch(e){ return null; }
    });
    return names.filter(Boolean);
  }

  async function addVote(periodKey, name){
    var id = Date.now()+'_'+Math.random().toString(36).slice(2,8);
    try{
      await window.storage.set('vote:'+periodKey+':'+id, name, true);
      return true;
    }catch(e){ return false; }
  }

  async function loadHistory(){
    try{
      var res = await window.storage.get('history', true);
      return res ? JSON.parse(res.value) : {};
    }catch(e){ return {}; }
  }

  async function saveHistoryEntry(periodKey, entry){
    var hist = await loadHistory();
    hist[periodKey] = entry;
    try{
      await window.storage.set('history', JSON.stringify(hist), true);
    }catch(e){}
    return hist;
  }

  function tally(names){
    var counts = {};
    names.forEach(function(n){ counts[n] = (counts[n]||0)+1; });
    var max = 0, winners = [];
    Object.keys(counts).forEach(function(name){
      var c = counts[name];
      if(c > max){ max = c; winners = [name]; }
      else if(c === max && max > 0){ winners.push(name); }
    });
    return { counts: counts, max: max, winners: winners, total: names.length };
  }

  async function computeResults(periodKey){
    var names = await getVoteNames(periodKey);
    var t = tally(names);
    var entry = { winners: t.winners, count: t.max, total: t.total, computedAt: Date.now() };
    await saveHistoryEntry(periodKey, entry);
    return entry;
  }

  // ---------- DOM refs ----------
  var participateBtn = document.getElementById('participateBtn');
  var votingArea = document.getElementById('votingArea');
  var nameInput = document.getElementById('nameInput');
  var engraveBtn = document.getElementById('engraveBtn');
  var shardWrap = document.getElementById('shardWrap');
  var shardText = document.getElementById('shardText');
  var dropBtn = document.getElementById('dropBtn');
  var kraterFill = document.getElementById('kraterFill');
  var kraterWrap = document.getElementById('kraterWrap');
  var historyList = document.getElementById('historyList');
  var resultsButtonWrap = document.getElementById('resultsButtonWrap');
  var countdownEl = document.getElementById('countdown');
  var overlay = document.getElementById('resultsOverlay');
  var loadingState = document.getElementById('loadingState');
  var revealState = document.getElementById('revealState');
  var revealName = document.getElementById('revealName');
  var revealMeta = document.getElementById('revealMeta');
  var revealFlavor = document.getElementById('revealFlavor');
  var closeOverlayBtn = document.getElementById('closeOverlayBtn');
  var toast = document.getElementById('toast');

  var state = {
    periods: null,
    history: {},
    currentName: '',
    voteCount: 0
  };

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.remove('hidden');
    requestAnimationFrame(function(){ toast.classList.add('show'); });
    setTimeout(function(){
      toast.classList.remove('show');
      setTimeout(function(){ toast.classList.add('hidden'); }, 320);
    }, 1900);
  }

  function delay(ms){ return new Promise(function(res){ setTimeout(res, ms); }); }

  // ---------- 참여 흐름 ----------
  participateBtn.addEventListener('click', function(){
    votingArea.classList.remove('hidden');
    participateBtn.style.display = 'none';
    votingArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    nameInput.focus();
  });

  engraveBtn.addEventListener('click', function(){
    var name = nameInput.value.trim();
    if(!name){
      nameInput.focus();
      showToast('이름을 적어주세요.');
      return;
    }
    state.currentName = name;
    nameInput.disabled = true;
    engraveBtn.disabled = true;

    shardText.innerHTML = '';
    Array.from(name).forEach(function(ch, i){
      var span = document.createElement('span');
      span.textContent = ch;
      span.style.animationDelay = (i*70)+'ms';
      shardText.appendChild(span);
    });

    shardWrap.classList.remove('hidden');
    document.getElementById('shard').classList.remove('dropping');
  });

  dropBtn.addEventListener('click', function(){
    var shard = document.getElementById('shard');
    shard.classList.add('dropping');
    setTimeout(async function(){
      var name = state.currentName;
      await addVote(state.periods.currentPeriodKey, name);
      state.voteCount += 1;
      updateKraterFill(state.voteCount);
      pulseKrater();
      showToast('도편이 바구니에 담겼습니다.');

      shardWrap.classList.add('hidden');
      shard.classList.remove('dropping');
      shardText.innerHTML = '';
      nameInput.value = '';
      nameInput.disabled = false;
      engraveBtn.disabled = false;
      nameInput.focus();
    }, 720);
  });

  function pulseKrater(){
    kraterWrap.classList.add('pulse');
    setTimeout(function(){ kraterWrap.classList.remove('pulse'); }, 450);
  }

  function updateKraterFill(count){
    var pct = Math.min(count / FULL_VOTES_FOR_FILL, 1);
    var h = pct * 200;
    kraterFill.setAttribute('height', h);
    kraterFill.setAttribute('y', 240 - h);
  }

  // ---------- 역사 패널 ----------
  function renderHistory(hist){
    var keys = Object.keys(hist).sort().reverse();
    historyList.innerHTML = '';
    if(keys.length === 0){
      historyList.innerHTML = '<li class="history-empty">아직 추방된 자가 없습니다.</li>';
      return;
    }
    keys.forEach(function(k){
      var entry = hist[k];
      var li = document.createElement('li');
      li.className = 'history-item';
      var dateStr = formatKoreanDate(k);
      var winnerStr, countStr;
      if(!entry.winners || entry.winners.length === 0){
        winnerStr = '추방자 없음';
        countStr = '투표 0건';
      } else if(entry.winners.length === 1){
        winnerStr = entry.winners[0];
        countStr = entry.count + '표 · 총 ' + entry.total + '표 중';
      } else {
        winnerStr = entry.winners.join(' · ') + ' (공동 추방)';
        countStr = '각 ' + entry.count + '표 · 총 ' + entry.total + '표 중';
      }
      li.innerHTML =
        '<div class="history-date">' + dateStr + ' 결과</div>' +
        '<div class="history-winner">' + escapeHtml(winnerStr) + '</div>' +
        '<div class="history-count">' + countStr + '</div>';
      historyList.appendChild(li);
    });
  }

  function escapeHtml(s){
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ---------- 결과 버튼 ----------
  async function refreshResultsButton(){
    var lastKey = state.periods.lastPeriodKey;
    var existing = state.history[lastKey];

    if(existing){
      resultsButtonWrap.innerHTML =
        '<button class="results-pill" id="viewResultBtn">📜 ' + formatKoreanDate(lastKey) + ' 결과 다시 보기</button>';
      document.getElementById('viewResultBtn').addEventListener('click', function(){
        openOverlay(lastKey, false);
      });
      return;
    }

    var keys = await getVoteKeys(lastKey);
    if(keys.length > 0){
      resultsButtonWrap.innerHTML =
        '<button class="results-pill" id="viewResultBtn">⚖️ 결과 보기 — ' + formatKoreanDate(lastKey) + '</button>';
      document.getElementById('viewResultBtn').addEventListener('click', function(){
        openOverlay(lastKey, true);
      });
    } else {
      resultsButtonWrap.innerHTML = '';
    }
  }

  // ---------- 결과 발표 오버레이 ----------
  async function openOverlay(periodKey, fresh){
    overlay.classList.remove('hidden');
    loadingState.classList.remove('hidden');
    revealState.classList.add('hidden');

    var entryPromise = fresh ? computeResults(periodKey) : Promise.resolve(state.history[periodKey]);
    var entry = await Promise.all([entryPromise, delay(2300)]).then(function(r){ return r[0]; });

    if(fresh){
      state.history[periodKey] = entry;
    }

    loadingState.classList.add('hidden');
    revealState.classList.remove('hidden');

    if(!entry.winners || entry.winners.length === 0){
      revealName.textContent = '추방자 없음';
      revealMeta.textContent = '이번 주는 도편이 한 장도 들어오지 않았습니다.';
      revealFlavor.textContent = '아고라는 조용했다.';
    } else if(entry.winners.length === 1){
      revealName.textContent = entry.winners[0];
      revealMeta.textContent = entry.count + '표 · 총 ' + entry.total + '표 중';
      revealFlavor.textContent = entry.winners[0] + '은(는) 아고라에서 추방되었다.';
    } else {
      revealName.textContent = entry.winners.join(' · ');
      revealMeta.textContent = '각 ' + entry.count + '표 동률 · 총 ' + entry.total + '표 중';
      revealFlavor.textContent = '이번 주는 함께 추방되었다.';
    }

    renderHistory(state.history);
    refreshResultsButton();
  }

  closeOverlayBtn.addEventListener('click', function(){
    overlay.classList.add('hidden');
  });

  // ---------- 카운트다운 ----------
  function tickCountdown(){
    var now = new Date();
    var diff = state.periods.currentDeadline - now;
    if(diff <= 0){
      countdownEl.textContent = '곧 결과가 발표됩니다…';
      return;
    }
    var totalMin = Math.floor(diff / 60000);
    var d = Math.floor(totalMin / (60*24));
    var h = Math.floor((totalMin % (60*24)) / 60);
    var m = totalMin % 60;
    countdownEl.textContent = '다음 추방까지 ' + d + '일 ' + h + '시간 ' + m + '분 남음';
  }

  // ---------- 초기화 ----------
  async function init(){
    var now = new Date();
    state.periods = getPeriods(now);
    state.history = await loadHistory();

    renderHistory(state.history);

    var currentKeys = await getVoteKeys(state.periods.currentPeriodKey);
    state.voteCount = currentKeys.length;
    updateKraterFill(state.voteCount);

    await refreshResultsButton();
    tickCountdown();

    setInterval(function(){
      tickCountdown();
      var newPeriods = getPeriods(new Date());
      if(newPeriods.currentPeriodKey !== state.periods.currentPeriodKey){
        state.periods = newPeriods;
        refreshResultsButton();
      }
    }, 30000);
  }

  init();
})();
</script>

</body>
</html>
